version: '3.8'

# CPU fallback override — use on machines without an NVIDIA GPU.
# Usage: docker compose -f docker-compose.yml -f docker-compose.cpu.yml up -d
#
# This override:
#   - Clears the GPU device reservation added in docker-compose.yml
#   - Sets CUDA_VISIBLE_DEVICES=-1 so PyTorch reports no CUDA devices and
#     gracefully falls back to CPU
#   - Sets NVIDIA_VISIBLE_DEVICES=void so the NVIDIA Container Toolkit (if
#     present) does not attempt to inject GPU devices into the container

services:
  chainlit-app:
    deploy:
      resources: {}
    environment:
      - NVIDIA_VISIBLE_DEVICES=void
      - CUDA_VISIBLE_DEVICES=-1
